<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 18 Projects</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #e9edf4;
        --muted: #9aa4b2;
        --accent: #3aa0ff;
        --accent-hover: #5eb2ff;
        --border: #2a303c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1a2030 0%, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: linear-gradient(180deg, #1a1f29 0%, var(--panel) 100%);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.6rem, 2vw, 2rem);
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.5;
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      .btn {
        display: inline-block;
        text-align: center;
        text-decoration: none;
        font-weight: 600;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--text);
        background: #202634;
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease,
          transform 0.2s ease;
      }

      .btn:hover {
        background: #293143;
        border-color: #3a455b;
        transform: translateY(-1px);
      }

      .btn.primary {
        background: var(--accent);
        color: #061423;
        border-color: #2f8de6;
      }

      .btn.primary:hover {
        background: var(--accent-hover);
      }

      @media (max-width: 480px) {
        .card {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Lesson 18 Mini Projects</h1>
      <p>Choose a project to open:</p>
      <nav class="actions" aria-label="Project links">
        <a class="btn primary" href="./users/">Open Users project</a>
        <a class="btn" href="./gender/">Open Gender project</a>
      </nav>
    </main>
  </body>
</html>
